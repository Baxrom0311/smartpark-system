[project]
path = "."
brief_file = "PROJECT_BRIEF.md"
test_command = ""
logs_dir = ".agentloop/runs"
exclude_dirs = ["node_modules", ".expo", "__pycache__", ".venv"]
snapshot_exclude = ["\\.git/", "\\.agentloop/", "node_modules/", "\\.venv/", "__pycache__/", "\\.expo/", "dist/", "build/"]

# Parallel tests for each sub-project
[[project.tests]]
name = "backend"
command = "cd sado-api && python -m pytest -q --tb=short 2>/dev/null || echo 'TESTS_NOT_READY'"
cwd = "."
timeout_sec = 120

[[project.tests]]
name = "admin"
command = "cd sado-admin && npm run build 2>/dev/null || echo 'BUILD_NOT_READY'"
cwd = "."
timeout_sec = 120

[[project.tests]]
name = "mobile"
command = "cd sado-mobile && npx tsc --noEmit 2>/dev/null || echo 'TYPES_NOT_READY'"
cwd = "."
timeout_sec = 120

[loop]
plan_cycles = 5
review_cycles = 3
build_iterations = 8
no_change_limit = 3
sleep_between_rounds_sec = 2
max_total_builds = 150
max_discovery_rounds = 3
parallel_review = true
max_parallel_builders = 3

[retry]
max_attempts = 5
backoff_base = 3
backoff_max = 120
jitter = true

[budget]
max_cost_usd = 0
warn_at_pct = 80
cost_per_build_usd = 0.15
cost_per_review_usd = 0.05
cost_per_plan_usd = 0.10

[agents.planner]
command = "kiro-cli"
agent = "ai-planner"
timeout_sec = 3600
trust_all_tools = true

[agents.builder]
command = "kiro-cli"
agent = "ai-builder"
timeout_sec = 14400
trust_all_tools = true

[agents.reviewer]
command = "kiro-cli"
agent = "ai-reviewer"
timeout_sec = 3600
trust_all_tools = true

[kiro]
enabled = true
command = "kiro-cli"
agent = "ai-planner"
timeout_sec = 3600
resume = false
trust_tools = ""
trust_all_tools = true
require_mcp_startup = false

[kiro_builder]
enabled = true
command = "kiro-cli"
agent = "ai-builder"
timeout_sec = 14400
trust_tools = "read,write,grep,shell"
trust_all_tools = true


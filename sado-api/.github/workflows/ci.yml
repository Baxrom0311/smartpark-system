name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Cancel in-flight runs for the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip==24.2
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check .

  test:
    name: Tests (pytest + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    env:
      APP_ENV: test
      JWT_SECRET: ci-secret-which-is-long-enough-1234567890
      DATABASE_URL: sqlite+aiosqlite:///./test_sado.db
      CELERY_TASK_ALWAYS_EAGER: "true"
      RATE_LIMIT_AUTH_PER_MINUTE: "1000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip==24.2
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -q

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 14

  docker:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose config
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml config -q

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: sado-api:ci
          cache-from: type=gha,scope=sado-api
          cache-to: type=gha,scope=sado-api,mode=max

name: sado-mobile CI

on:
  push:
    branches: [main]
    paths:
      - "**"
      - "!README.md"
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: sado-mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck / test
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: "npm"

      - name: Install dependencies
        # `npm ci` enforces the exact versions pinned in package-lock,
        # which matches the reproducibility constraint from AGENTS.md.
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Typecheck (tsc strict)
        run: npx tsc --noEmit

      - name: Tests (jest)
        run: npm test -- --ci --runInBand

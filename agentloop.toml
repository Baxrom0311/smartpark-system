[project]
path = "."
brief_file = "PROJECT_BRIEF.md"
test_command = ""
logs_dir = ".agentloop/runs"
exclude_dirs = ["node_modules", "__pycache__", ".venv", ".gradle", ".pio"]
snapshot_exclude = ["\\.git/", "\\.agentloop/", "node_modules/", "\\.venv/", "__pycache__/", "\\.gradle/", "\\.pio/", "build/", "\\.idea/"]

[[project.tests]]
name = "backend"
command = "cd backend && .venv/bin/python -m pytest --tb=short -q"
cwd = "."
timeout_sec = 300

[[project.tests]]
name = "firmware_build"
command = "cd firmware && pio run"
cwd = "."
timeout_sec = 120

[[project.tests]]
name = "android_build"
command = "cd android && JAVA_HOME=$(/usr/libexec/java_home -v 17 2>/dev/null || echo $JAVA_HOME) ./gradlew --no-daemon :app:assembleDebug"
cwd = "."
timeout_sec = 600

[loop]
plan_cycles = 3
review_cycles = 2
build_iterations = 10
no_change_limit = 2
sleep_between_rounds_sec = 0
max_total_builds = 50
max_discovery_rounds = 2
parallel_review = true
max_parallel_builders = 3

[retry]
max_attempts = 3
backoff_base = 2
backoff_max = 60
jitter = true

[budget]
max_cost_usd = 0
warn_at_pct = 80
cost_per_build_usd = 0.15
cost_per_review_usd = 0.05
cost_per_plan_usd = 0.10

[agents.planner]
command = "kiro-cli"
agent = "ai-planner"
timeout_sec = 3600
trust_all_tools = true

[agents.builder]
command = "kiro-cli"
agent = "ai-builder"
timeout_sec = 14400
trust_all_tools = true

[agents.reviewer]
command = "kiro-cli"
agent = "ai-reviewer"
timeout_sec = 3600
trust_all_tools = true

[kiro]
enabled = true
command = "kiro-cli"
agent = "ai-planner"
timeout_sec = 3600
resume = false
trust_tools = ""
trust_all_tools = true
require_mcp_startup = false

[kiro_builder]
enabled = true
command = "kiro-cli"
agent = "ai-builder"
timeout_sec = 14400
trust_tools = "read,write,grep,shell"
trust_all_tools = true

[telegram]
enabled = true
bot_token = ""
chat_id = ""

[git]
auto_push = true
branch = "main"
commit_message = "feat(smartpark): AI orchestrator build"

[[git.sub_repos]]
path = "firmware"
remote = "origin"
branch = "main"

[[git.sub_repos]]
path = "backend"
remote = "origin"
branch = "main"

[[git.sub_repos]]
path = "android"
remote = "origin"
branch = "main"

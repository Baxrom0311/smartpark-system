[project]
path = "."
brief_file = "PROJECT_BRIEF.md"
test_command = ""
logs_dir = ".agentloop/runs"
exclude_dirs = ["node_modules", ".expo", "__pycache__", ".venv"]
snapshot_exclude = ["\\.git/", "\\.agentloop/", "node_modules/", "\\.venv/", "__pycache__/", "\\.expo/", "dist/", "build/"]

# Parallel tests for each sub-project. Each command bootstraps its own
# isolated environment so the reviewer can verify a fresh checkout.
[[project.tests]]
name = "backend"
command = "cd sado-api && (test -d .venv || python3.12 -m venv .venv) && .venv/bin/pip install --quiet -e \".[dev]\" >/dev/null 2>&1 && .venv/bin/python -m pytest --tb=short --cov=app --cov-report=term-missing --cov-fail-under=80"
cwd = "."
timeout_sec = 600

[[project.tests]]
name = "admin"
command = "cd sado-admin && (test -d node_modules || npm install --no-audit --no-fund --silent) && npm run build || echo 'BUILD_NOT_READY'"
cwd = "."
timeout_sec = 600

[[project.tests]]
name = "mobile"
command = "cd sado-mobile && (test -d node_modules || npm install --no-audit --no-fund --silent) && ./node_modules/.bin/tsc --noEmit || echo 'TYPES_NOT_READY'"
cwd = "."
timeout_sec = 600

[loop]
plan_cycles = 5
review_cycles = 2
build_iterations = 12
no_change_limit = 2
sleep_between_rounds_sec = 0
max_total_builds = 200
max_discovery_rounds = 2
parallel_review = true
max_parallel_builders = 6

[retry]
max_attempts = 3
backoff_base = 2
backoff_max = 30
jitter = true

[budget]
max_cost_usd = 0
warn_at_pct = 80
cost_per_build_usd = 0.15
cost_per_review_usd = 0.05
cost_per_plan_usd = 0.10

[agents.planner]
command = "kiro-cli"
agent = "ai-planner"
timeout_sec = 3600
trust_all_tools = true

[agents.builder]
command = "kiro-cli"
agent = "ai-builder"
timeout_sec = 14400
trust_all_tools = true

[agents.reviewer]
command = "kiro-cli"
agent = "ai-reviewer"
timeout_sec = 3600
trust_all_tools = true

[kiro]
enabled = true
command = "kiro-cli"
agent = "ai-planner"
timeout_sec = 3600
resume = false
trust_tools = ""
trust_all_tools = true
require_mcp_startup = false

[kiro_builder]
enabled = true
command = "kiro-cli"
agent = "ai-builder"
timeout_sec = 14400
trust_tools = "read,write,grep,shell"
trust_all_tools = true

